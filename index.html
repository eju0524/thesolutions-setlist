<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLUTIONS — Setlist Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8f8f8;
  --bg3: #f0f0f0;
  --line: rgba(0,0,0,0.08);
  --line2: rgba(0,0,0,0.14);
  --accent: #8ac900;
  --accent-dim: rgba(138,201,0,0.12);
  --accent-dim2: rgba(138,201,0,0.06);
  --red: #e0003a;
  --red-dim: rgba(224,0,58,0.08);
  --text: #111111;
  --text2: #555555;
  --text3: #aaaaaa;
  --mono: 'DM Mono', monospace;
  --display: 'Unbounded', sans-serif;
  --body: 'Noto Sans KR', sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
button{-webkit-appearance:none;appearance:none;color:inherit}
html{scroll-behavior:smooth;background:#ffffff!important;color-scheme:light}
body{background:#ffffff!important;color:#111111!important;font-family:var(--body);min-height:100vh;overflow-x:hidden}
body::before{display:none}

/* HEADER */
header{position:sticky;top:0;z-index:90;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(–line);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:baseline;gap:14px}
.logo{font-family:var(–display);font-weight:900;font-size:18px;letter-spacing:-.5px;color:var(–accent);text-transform:uppercase;cursor:pointer}
.logo-sub{font-family:var(–mono);font-size:10px;color:var(–text3);letter-spacing:3px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:32px}
.h-stat{text-align:right}
.h-stat-val{font-family:var(–mono);font-size:15px;color:var(–text);font-weight:500}
.h-stat-label{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:2px;text-transform:uppercase;margin-top:1px}

/* NAV BAR */
.nav-bar{display:flex;padding:0 40px;border-bottom:1px solid var(–line);background:var(–bg);gap:0;overflow-x:auto}
.nav-tab{font-family:var(–display);font-size:11px;font-weight:600;letter-spacing:1px;color:var(–text3);padding:14px 20px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px;white-space:nowrap;-webkit-appearance:none;appearance:none}
.nav-tab:hover{color:var(–text2)}
.nav-tab.active{color:var(–accent);border-bottom-color:var(–accent)}
.nav-tab.album-tab{margin-left:auto;color:var(–text2)}
.nav-tab.album-tab.active{color:var(–accent);border-bottom-color:var(–accent)}
.nav-divider{width:1px;background:var(–line);margin:10px 8px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 113px)}

/* SIDEBAR */
.sidebar{border-right:1px solid var(–line);overflow-y:auto;position:sticky;top:113px;height:calc(100vh - 113px);padding:28px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(–line2);border-radius:2px}
.sidebar-label{font-family:var(–mono);font-size:9px;letter-spacing:3px;color:var(–text3);text-transform:uppercase;padding:0 24px 14px}
.concert-btn{width:100%;background:none;border:none;text-align:left;padding:13px 24px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;position:relative}
.concert-btn::after{content:’’;position:absolute;inset:0;background:var(–accent-dim2);opacity:0;transition:opacity .15s}
.concert-btn:hover::after{opacity:1}
.concert-btn.active{border-left-color:var(–accent);background:var(–accent-dim2)}
.cb-date{font-family:var(–mono);font-size:10px;color:var(–text3);letter-spacing:1px;margin-bottom:3px}
.cb-venue{font-family:var(–display);font-size:12px;font-weight:600;color:var(–text);letter-spacing:-.3px}
.concert-btn.active .cb-venue{color:var(–accent)}
.cb-count{font-family:var(–mono);font-size:9px;color:var(–text3);margin-top:3px}
.month-divider{font-family:var(–mono);font-size:9px;letter-spacing:3px;color:var(–text3);text-transform:uppercase;padding:20px 24px 8px;border-top:1px solid var(–line);margin-top:8px}

/* CONTENT */
.content{padding:48px 52px;max-width:900px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CONCERT HERO */
.concert-hero{margin-bottom:48px}
.hero-top{margin-bottom:24px}
.hero-venue{font-family:var(–display);font-weight:900;font-size:48px;letter-spacing:-2px;color:var(–text);line-height:1;margin-bottom:12px}
.hero-date-row{display:flex;align-items:center;gap:12px}
.hero-year{font-family:var(–mono);font-size:11px;color:var(–text3);letter-spacing:3px}
.hero-date{font-family:var(–mono);font-weight:400;font-size:16px;color:var(–text2);letter-spacing:2px}
.hero-date em{color:var(–accent);font-style:normal}
.hero-tags{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.tag{font-family:var(–mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-radius:2px}
.tag-neutral{background:var(–bg3);color:var(–text2);border:1px solid var(–line2)}
.tag-green{background:var(–accent-dim);color:var(–accent);border:1px solid rgba(200,255,0,.25)}
.hero-divider{height:1px;background:linear-gradient(90deg,var(–accent) 0%,transparent 60%)}

/* SETLIST */
.set-label{font-family:var(–mono);font-size:9px;letter-spacing:4px;color:var(–text3);text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.set-label::after{content:’’;flex:1;height:1px;background:var(–line)}
.setlist{list-style:none;margin-bottom:40px}
.sl-item{display:grid;grid-template-columns:32px 1fr auto;align-items:center;gap:16px;padding:15px 0;border-bottom:1px solid var(–line);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.sl-item::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:0;background:var(–accent-dim);transition:width .2s ease}
.sl-item:hover::before{width:100%}
.sl-item:hover .sl-song{color:var(–accent);padding-left:4px}
.sl-num{font-family:var(–mono);font-size:11px;color:var(–text3);text-align:right;position:relative;z-index:1}
.sl-song{font-size:15px;font-weight:500;letter-spacing:-.2px;transition:all .15s;position:relative;z-index:1;display:flex;align-items:center;gap:10px}
.sl-badge{font-family:var(–mono);font-size:8px;letter-spacing:1.5px;padding:3px 7px;border-radius:2px;text-transform:uppercase;flex-shrink:0}
.badge-first{background:var(–accent-dim);color:var(–accent);border:1px solid rgba(200,255,0,.3)}
.badge-rare{background:var(–red-dim);color:var(–red);border:1px solid rgba(255,77,109,.25)}
.sl-gap{font-family:var(–mono);font-size:10px;color:var(–text3);text-align:right;position:relative;z-index:1;white-space:nowrap}
.sl-gap.gap-long{color:var(–red)}
.sl-gap.gap-first{color:var(–accent)}

/* ══════════════════════════════════════
ALBUM PAGE
══════════════════════════════════════ */
.album-page{padding:48px 52px;animation:fadeIn .3s ease;width:100%}

.album-page-header{margin-bottom:40px}
.album-page-title{font-family:var(–display);font-weight:900;font-size:40px;letter-spacing:-2px;color:var(–text);margin-bottom:16px}
.album-page-title span{color:var(–accent)}

/* 연도 필터 */
.year-filter{display:flex;gap:6px;flex-wrap:wrap}
.yf-btn{font-family:var(–mono);font-size:10px;letter-spacing:2px;padding:6px 14px;border-radius:2px;border:1px solid var(–line2);background:transparent;color:var(–text3);cursor:pointer;transition:all .15s;-webkit-appearance:none;appearance:none}
.yf-btn:hover{color:var(–text2)}
.yf-btn.active{background:var(–accent);color:#000;border-color:var(–accent);font-weight:500}

/* 앨범 그리드 */
.albums-grid{display:flex;flex-direction:column;gap:32px}

.alb-card{border:1px solid var(–line);border-radius:4px;overflow:hidden;transition:border-color .2s}
.alb-card:hover{border-color:var(–line2)}

.alb-card-header{display:flex;align-items:center;gap:20px;padding:20px 24px;cursor:pointer;position:relative}
.alb-card-header::after{content:’’;position:absolute;left:0;top:0;bottom:0;width:3px}

.alb-cover{width:64px;height:64px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}

.alb-meta{flex:1}
.alb-title{font-family:var(–display);font-weight:900;font-size:16px;letter-spacing:-.5px;margin-bottom:4px}
.alb-info{font-family:var(–mono);font-size:10px;color:var(–text3);letter-spacing:1px}

.alb-stats{text-align:right}
.alb-played-count{font-family:var(–display);font-weight:900;font-size:28px;letter-spacing:-1px}
.alb-played-label{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:2px;margin-top:2px}

.alb-chevron{font-family:var(–mono);font-size:14px;color:var(–text3);margin-left:12px;transition:transform .2s}
.alb-card.open .alb-chevron{transform:rotate(180deg)}

/* 곡 목록 */
.alb-songs{display:none;border-top:1px solid var(–line)}
.alb-card.open .alb-songs{display:block}

.alb-song-item{display:grid;grid-template-columns:28px 1fr auto auto;align-items:center;gap:14px;padding:13px 24px;border-bottom:1px solid var(–line);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.alb-song-item::before{content:’’;position:absolute;inset:0;background:var(–accent-dim2);opacity:0;transition:opacity .15s}
.alb-song-item:hover::before{opacity:1}
.alb-song-item:last-child{border-bottom:none}
.alb-song-item.zero{opacity:.4}
.alb-song-item.zero:hover::before{opacity:0}
.alb-song-item.zero{cursor:default}

.as-track{font-family:var(–mono);font-size:10px;color:var(–text3);text-align:right;position:relative;z-index:1}
.as-name{font-size:14px;font-weight:500;position:relative;z-index:1;transition:color .15s}
.alb-song-item:not(.zero):hover .as-name{color:var(–accent)}

.as-bar-wrap{width:80px;position:relative;z-index:1}
.as-bar-bg{height:3px;background:var(–bg3);border-radius:2px;overflow:hidden}
.as-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}

.as-count{font-family:var(–mono);font-size:11px;color:var(–text2);text-align:right;position:relative;z-index:1;min-width:36px}
.as-count.zero-count{color:var(–text3)}

/* ══════════════════════════════════════
SONG PANEL
══════════════════════════════════════ */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.song-panel{position:fixed;right:0;top:0;bottom:0;width:420px;background:#ffffff;border-left:1px solid var(–line2);z-index:210;overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);-webkit-overflow-scrolling:touch;overscroll-behavior:contain;isolation:isolate}
.song-panel::-webkit-scrollbar{width:3px}
.song-panel::-webkit-scrollbar-thumb{background:var(–line2)}
.song-panel.open{transform:translateX(0)}

.panel-top{padding:20px 24px 16px;border-bottom:1px solid var(–line);position:sticky;top:0;background:#ffffff;z-index:5;backdrop-filter:none;-webkit-backdrop-filter:none}
.panel-close-btn{display:flex;align-items:center;gap:6px;background:var(–bg3);border:1px solid var(–line2);color:var(–text2);font-family:var(–mono);font-size:10px;letter-spacing:2px;padding:5px 12px;border-radius:2px;cursor:pointer;margin-bottom:16px;transition:all .15s}
.panel-close-btn:hover{border-color:var(–accent);color:var(–accent)}
.panel-song-name{font-family:var(–display);font-weight:900;font-size:32px;line-height:1;letter-spacing:-1.5px;color:var(–text);margin-bottom:4px}
.panel-song-album{font-family:var(–mono);font-size:10px;letter-spacing:2px;margin-top:8px;padding:4px 10px;border-radius:2px;display:inline-block}
.panel-song-sub{font-family:var(–mono);font-size:10px;color:var(–text3);letter-spacing:2px;margin-top:6px}

.panel-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(–line);border-top:1px solid var(–line);border-bottom:1px solid var(–line)}
.pstat{background:var(–bg2);padding:20px}
.pstat-val{font-family:var(–display);font-weight:900;font-size:28px;color:var(–accent);letter-spacing:-1px;line-height:1}
.pstat-label{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:2px;text-transform:uppercase;margin-top:6px}

.panel-history{padding:28px 32px}
.ph-label{font-family:var(–mono);font-size:9px;letter-spacing:3px;color:var(–text3);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.ph-label::after{content:’’;flex:1;height:1px;background:var(–line)}

.timeline{position:relative;padding-left:20px}
.timeline::before{content:’’;position:absolute;left:5px;top:8px;bottom:8px;width:1px;background:var(–line2)}

.tl-item{position:relative;padding:0 0 24px 20px}
.tl-dot{position:absolute;left:-15px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid var(–line2);background:#ffffff;z-index:2}
.tl-item.current .tl-dot{background:var(–accent);border-color:var(–accent);box-shadow:0 0 8px rgba(200,255,0,.5)}
.tl-date{font-family:var(–mono);font-size:10px;color:var(–text3);letter-spacing:1px;margin-bottom:3px}

/* 클릭 가능한 공연명 */
.tl-venue-link{font-family:var(–display);font-size:13px;font-weight:600;letter-spacing:-.3px;color:var(–text);margin-bottom:3px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .15s;border-bottom:1px solid transparent;padding-bottom:1px}
.tl-venue-link:hover{color:var(–accent);border-bottom-color:var(–accent)}
.tl-venue-link::after{content:‘↗’;font-size:10px;opacity:.5}
.tl-item.current .tl-venue-link{color:var(–accent)}

.tl-order{font-family:var(–mono);font-size:10px;color:var(–text3)}
.tl-gap-badge{display:inline-block;font-family:var(–mono);font-size:9px;padding:2px 7px;border-radius:2px;margin-top:5px;background:var(–bg3);color:var(–text3);border:1px solid var(–line)}

/* MEDLEY */
.medley-item{ cursor:default }
.medley-item::before{ display:none }
.medley-label{ font-size:15px;font-weight:500;color:var(–text2) }
.medley-chips{ display:flex;align-items:center;gap:4px;flex-wrap:wrap }
.medley-chip{
font-family:var(–mono);font-size:11px;padding:3px 10px;border-radius:2px;
background:var(–bg3);border:1px solid var(–line2);color:var(–text);
cursor:pointer;transition:all .15s;
}
.medley-chip:hover{ background:var(–accent-dim);border-color:var(–accent);color:var(–accent) }
.medley-plus{ font-family:var(–mono);font-size:10px;color:var(–text3) }

/* MOBILE */
@media(max-width:720px){
header{padding:0 20px}
.header-right{gap:16px}
.h-stat:first-child{display:none}
.nav-bar{padding:0 20px}
.layout{grid-template-columns:1fr}
.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(–line);display:flex;overflow-x:auto;padding:12px 0}
.sidebar::-webkit-scrollbar{height:0}
.sidebar-label,.month-divider{display:none}
.concert-btn{border-left:none;border-bottom:2px solid transparent;white-space:nowrap;padding:8px 16px;min-width:fit-content}
.concert-btn.active{border-bottom-color:var(–accent);background:none}
.content,.album-page{padding:28px 20px}
.hero-venue{font-size:32px}
.song-panel{width:100%}
.album-page-title{font-size:28px}
.as-bar-wrap{display:none}
}
</style>

</head>
<body>

<header>
  <div class="logo-wrap" onclick="goHome()">
    <div class="logo">Solutions</div>
    <div class="logo-sub">Setlist Archive</div>
  </div>
  <div class="header-right">
    <div class="h-stat">
      <div class="h-stat-val" id="hd-concerts">—</div>
      <div class="h-stat-label">Concerts</div>
    </div>
    <div class="h-stat">
      <div class="h-stat-val" id="hd-songs">—</div>
      <div class="h-stat-label">Songs</div>
    </div>
  </div>
</header>

<div class="nav-bar" id="nav-bar"></div>

<div id="app"></div>

<!-- Song Panel -->

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<aside class="song-panel" id="song-panel">
  <div class="panel-top">
    <button class="panel-close-btn" onclick="closePanel()">← CLOSE</button>
    <div class="panel-song-name" id="p-name">—</div>
    <div id="p-album-badge"></div>
    <div class="panel-song-sub" id="p-sub"></div>
  </div>
  <div class="panel-stats" id="p-stats"></div>
  <div class="panel-history">
    <div class="ph-label">Performance History</div>
    <div class="timeline" id="p-timeline"></div>
  </div>
</aside>

<script>
// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS URLs
// ═══════════════════════════════════════════════════════
// 구글시트 ID
const SHEET_URLS = {
  concerts: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGBGBBQu_jU3cS1WpazLNKVbNHm8dAMZDATDq0mui35-3A4iswXJx9Sr2BRhPDEHq3CsTd_WCpn8lt/pub?gid=1091944574&single=true&output=csv',
  setlist:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGBGBBQu_jU3cS1WpazLNKVbNHm8dAMZDATDq0mui35-3A4iswXJx9Sr2BRhPDEHq3CsTd_WCpn8lt/pub?gid=1506630958&single=true&output=csv',
  albums:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGBGBBQu_jU3cS1WpazLNKVbNHm8dAMZDATDq0mui35-3A4iswXJx9Sr2BRhPDEHq3CsTd_WCpn8lt/pub?gid=416756515&single=true&output=csv',
  songs:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGBGBBQu_jU3cS1WpazLNKVbNHm8dAMZDATDq0mui35-3A4iswXJx9Sr2BRhPDEHq3CsTd_WCpn8lt/pub?gid=6280811&single=true&output=csv',
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').replace(/^"|"$/g,'').trim(); });
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

async function fetchCSV(url) {
  // corsproxy 통해서 가져오기 (처음 됐던 방식)
  try {
    const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    if (!res.ok) throw new Error('proxy 실패');
    const text = await res.text();
    if (text.includes(',')) return parseCSV(text);
  } catch(e) {}
  // 직접 시도
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('직접 실패');
    const text = await res.text();
    return parseCSV(text);
  } catch(e) {}
  throw new Error('모든 fetch 실패');
}

// ═══════════════════════════════════════════════════════
// DATA (시트에서 로드 후 채워짐)
// ═══════════════════════════════════════════════════════
let CONCERTS = {};
let ALBUMS   = [];
let MEDLEYS  = { "종+멸": ["종", "멸"] };
let SONG_TO_ALBUM = {};
let SONG_HISTORY  = {};

function expandSong(s)  { return MEDLEYS[s] || [s]; }
function isMedley(s)    { return !!MEDLEYS[s]; }

// ── 시트 데이터 → 내부 구조 변환 ──────────────────────
function processData(concertRows, setlistRows, albumRows, songRows) {

  // ALBUMS
  ALBUMS = albumRows.map(r => ({
    id:    r.album_id,
    name:  r.album_name,
    year:  +r.year || 0,
    color: r.color || '#888',
    tracks: [],
  }));
  ALBUMS.push({ id:'etc', name:'기타/미분류', year:0, color:'#555', tracks:[] });

  // SONGS → 앨범 tracks 채우기
  SONG_TO_ALBUM = {};
  songRows.forEach(r => {
    const alb = ALBUMS.find(a => a.id === r.album_id);
    if (alb) alb.tracks.push(r.song);
    SONG_TO_ALBUM[r.song] = r.album_id || 'etc';
    // combined 곡 처리 (sub_songs 컬럼 있을 경우)
    if (r.combined === 'TRUE' && r.sub_songs) {
      const subs = r.sub_songs.split('/').map(s => s.trim());
      MEDLEYS[r.song] = subs;
    }
  });

  // CONCERTS
  const concertMap = {};
  concertRows.forEach(r => {
    if (!r.concert_id || !r.date) return;
    const year = +r.date.slice(0,4);
    if (!concertMap[year]) concertMap[year] = [];
    concertMap[year].push({
      id:      r.concert_id,
      date:    r.date,
      venue:   r.venue,
      setlist: [],
    });
  });

  // SETLIST → concerts에 붙이기
  setlistRows.forEach(r => {
    if (!r.concert_id || !r.song) return;
    const year = Object.keys(concertMap).find(y =>
      concertMap[y].some(c => c.id === r.concert_id)
    );
    if (!year) return;
    const concert = concertMap[year].find(c => c.id === r.concert_id);
    if (!concert) return;
    concert.setlist.push({
      o:   +r.order,
      s:   r.song,
      sec: r.section || 'main',
    });
  });

  // 각 공연 셋리 순서 정렬
  Object.values(concertMap).forEach(concerts => {
    concerts.forEach(c => c.setlist.sort((a,b) => a.o - b.o));
    concerts.sort((a,b) => a.date.localeCompare(b.date));
  });

  CONCERTS = concertMap;

  // SONG_HISTORY 빌드
  SONG_HISTORY = {};
  Object.values(CONCERTS).forEach(concerts => {
    concerts.forEach(c => {
      c.setlist.forEach(item => {
        expandSong(item.s).forEach(song => {
          if (!SONG_HISTORY[song]) SONG_HISTORY[song] = [];
          SONG_HISTORY[song].push({
            concertId: c.id, date: c.date, venue: c.venue,
            order: item.o, sec: item.sec, displayName: item.s,
          });
        });
      });
    });
  });
}

function getAlbum(song) {
  const id = SONG_TO_ALBUM[song] || 'etc';
  return ALBUMS.find(a => a.id === id) || ALBUMS[ALBUMS.length-1];
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let page        = 'setlist'; // 'setlist' | 'albums'
let currentYear = 2026;
let currentIdx  = 0;
let albumYear   = 'all';

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function parseDate(s){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)}
function daysBetween(a,b){return Math.round(Math.abs(parseDate(b)-parseDate(a))/864e5)}
function fmtDate(s){const[y,m,d]=s.split('-');return`${y}.${m}.${d}`}

function getGap(song, concertId) {
  const hist = SONG_HISTORY[song];
  if (!hist) return null;
  const idx = hist.findIndex(h => h.concertId === concertId);
  if (idx <= 0) return { type:'first', label:'첫 공연' };
  const days = daysBetween(hist[idx-1].date, hist[idx].date);
  return { type: days > 60 ? 'long' : 'normal', label:`${days}일 만` };
}

// 곡의 특정 연도 공연 횟수
function getSongCountByYear(song, year) {
  const hist = SONG_HISTORY[song] || [];
  if (year === 'all') return hist.length;
  return hist.filter(h => h.date.startsWith(String(year))).length;
}

function getTotalConcerts(){ return Object.values(CONCERTS).reduce((a,b)=>a+b.length,0) }
function getAllUniqueSongs(){ return Object.keys(SONG_HISTORY).length }

// concertId → {year, idx}
function findConcertLocation(concertId) {
  for (const [year, concerts] of Object.entries(CONCERTS)) {
    const idx = concerts.findIndex(c => c.id === concertId);
    if (idx !== -1) return { year: +year, idx };
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function renderNav() {
  const years = Object.keys(CONCERTS).sort((a,b) => b - a);
  let html = years.map(y =>
    `<button class="nav-tab ${page==='setlist'&&+y===currentYear?'active':''}" onclick="switchYear(${y})">${y}</button>`
  ).join('');
  html += `<div class="nav-divider"></div>`;
  html += `<button class="nav-tab album-tab ${page==='albums'?'active':''}" onclick="switchPage('albums')">💿 ALBUMS</button>`;
  document.getElementById('nav-bar').innerHTML = html;
}

function renderHeader() {
  document.getElementById('hd-concerts').textContent = getTotalConcerts();
  document.getElementById('hd-songs').textContent    = getAllUniqueSongs();
}

// ═══════════════════════════════════════════════════════
// SETLIST PAGE
// ═══════════════════════════════════════════════════════
function renderSetlistPage() {
  const concerts = CONCERTS[currentYear] || [];
  let sidebarHtml = `<div class="sidebar-label">${currentYear} Concerts</div>`;
  let lastMonth = '';
  concerts.forEach((c, i) => {
    const month = c.date.slice(0,7);
    if (month !== lastMonth) {
      if (lastMonth) sidebarHtml += `<div class="month-divider">${c.date.slice(5,7)}월</div>`;
      lastMonth = month;
    }
    sidebarHtml += `
      <button class="concert-btn ${i===currentIdx?'active':''}" onclick="selectConcert(${i})">
        <div class="cb-date">${fmtDate(c.date)}</div>
        <div class="cb-venue">${c.venue}</div>
        <div class="cb-count">${c.setlist.length} tracks</div>
      </button>`;
  });
  if (!concerts.length) sidebarHtml += `<div style="padding:32px 24px;font-family:var(--mono);font-size:11px;color:var(--text3)">데이터 없음</div>`;

  document.getElementById('app').innerHTML = `
    <div class="layout">
      <aside class="sidebar">${sidebarHtml}</aside>
      <main class="content" id="concert-content"></main>
    </div>`;

  renderConcertContent();
}

function renderConcertContent() {
  const concerts = CONCERTS[currentYear] || [];
  const el = document.getElementById('concert-content');
  if (!el) return;
  if (!concerts.length) {
    el.innerHTML = `<div style="padding:80px 0;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3)">해당 연도 데이터가 없습니다</div>`;
    return;
  }
  const c = concerts[currentIdx];
  const [y, m, d] = c.date.split('-');
  const main   = c.setlist.filter(x => x.sec==='main');
  const encore = c.setlist.filter(x => x.sec==='encore');

  function renderItems(items) {
    return items.map(item => {
      const isM = isMedley(item.s);
      const subSongs = expandSong(item.s);
      // gap은 첫 번째 서브곡 기준
      const gap = getGap(subSongs[0], c.id);
      let badgeHtml='', gapHtml='';
      if (gap) {
        if (gap.type==='first') { badgeHtml=`<span class="sl-badge badge-first">첫 공연</span>`; gapHtml=`<span class="sl-gap gap-first">✦ debut</span>`; }
        else if (gap.type==='long') { badgeHtml=`<span class="sl-badge badge-rare">오랜만</span>`; gapHtml=`<span class="sl-gap gap-long">${gap.label}</span>`; }
        else { gapHtml=`<span class="sl-gap">${gap.label}</span>`; }
      }

      if (isM) {
        // 메들리: 표기는 종+멸, 클릭하면 서브곡 선택 팝업 대신 첫 곡 패널 열기
        // 서브곡 각각 클릭 가능한 칩으로 표시
        const chips = subSongs.map(sub =>
          `<span class="medley-chip" onclick="event.stopPropagation();openPanel('${sub}','${c.id}')">${sub}</span>`
        ).join('<span class="medley-plus">+</span>');
        return `<li class="sl-item medley-item">
          <span class="sl-num">${String(item.o).padStart(2,'0')}</span>
          <span class="sl-song">
            <span class="medley-label">${item.s}</span>
            <span class="medley-chips">${chips}</span>
            ${badgeHtml}
          </span>
          ${gapHtml}
        </li>`;
      }

      return `<li class="sl-item" onclick="openPanel('${item.s}','${c.id}')">
        <span class="sl-num">${String(item.o).padStart(2,'0')}</span>
        <span class="sl-song">${item.s}${badgeHtml}</span>
        ${gapHtml}
      </li>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="concert-hero">
      <div class="hero-top">
        <div class="hero-venue">${c.venue}</div>
        <div class="hero-date-row">
          <span class="hero-year">${y}</span>
          <span class="hero-date">${m}<em>.</em>${d}</span>
          <div class="hero-tags">
            <span class="tag tag-neutral">${c.setlist.length} tracks</span>
            ${encore.length?`<span class="tag tag-green">앙코르 ${encore.length}</span>`:''}
          </div>
        </div>
      </div>
      <div class="hero-divider"></div>
    </div>
    ${main.length?`<div class="set-label">Main Set — ${main.length}</div><ul class="setlist">${renderItems(main)}</ul>`:''}
    ${encore.length?`<div class="set-label">Encore — ${encore.length}</div><ul class="setlist">${renderItems(encore)}</ul>`:''}
  `;
}

// ═══════════════════════════════════════════════════════
// ALBUM PAGE
// ═══════════════════════════════════════════════════════
function renderAlbumPage() {
  const years = ['all', ...Object.keys(CONCERTS).filter(y => CONCERTS[y].length)];
  const yfilter = years.map(y =>
    `<button class="yf-btn ${albumYear==y?'active':''}" onclick="setAlbumYear('${y}')">${y==='all'?'전체':y}</button>`
  ).join('');

  // 앨범별 총 플레이 횟수
  const albumsWithCount = ALBUMS.filter(a => a.id !== 'etc').map(alb => {
    const totalPlayed = alb.tracks.reduce((sum, t) => sum + getSongCountByYear(t, albumYear), 0);
    return { ...alb, totalPlayed };
  });

  const maxCount = Math.max(...albumsWithCount.flatMap(a => a.tracks.map(t => getSongCountByYear(t, albumYear))), 1);

  const albumCards = albumsWithCount.map(alb => {
    const songRows = alb.tracks.map((t, i) => {
      const count = getSongCountByYear(t, albumYear);
      const barW  = Math.round((count / maxCount) * 100);
      const isZero = count === 0;
      return `
        <div class="alb-song-item ${isZero?'zero':''}" ${!isZero?`onclick="openPanel('${t}',null)"`:''}">
          <span class="as-track">${String(i+1).padStart(2,'0')}</span>
          <span class="as-name">${t}</span>
          <div class="as-bar-wrap">
            <div class="as-bar-bg">
              <div class="as-bar-fill" style="width:${barW}%;background:${alb.color}"></div>
            </div>
          </div>
          <span class="as-count ${isZero?'zero-count':''}">${isZero?'—':count+'회'}</span>
        </div>`;
    }).join('');

    return `
      <div class="alb-card" id="alb-${alb.id}">
        <div class="alb-card-header" style="--alb-color:${alb.color}" onclick="toggleAlbum('${alb.id}')">
          <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${alb.color};border-radius:0"></div>
          <div class="alb-cover" style="background:${alb.color}15;border:1px solid ${alb.color}30">
            <span>💿</span>
          </div>
          <div class="alb-meta">
            <div class="alb-title" style="color:${alb.color}">${alb.name}</div>
            <div class="alb-info">${alb.year} · ${alb.tracks.length}곡</div>
          </div>
          <div class="alb-stats">
            <div class="alb-played-count" style="color:${alb.color}">${alb.totalPlayed}</div>
            <div class="alb-played-label">총 공연</div>
          </div>
          <span class="alb-chevron">▼</span>
        </div>
        <div class="alb-songs">${songRows}</div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="album-page">
      <div class="album-page-header">
        <div class="album-page-title">Album <span>Stats</span></div>
        <div class="year-filter">${yfilter}</div>
      </div>
      <div class="albums-grid">${albumCards}</div>
    </div>`;
}

function toggleAlbum(id) {
  document.getElementById(`alb-${id}`).classList.toggle('open');
}

function setAlbumYear(y) {
  albumYear = y;
  renderAlbumPage();
}

// ═══════════════════════════════════════════════════════
// SONG PANEL
// ═══════════════════════════════════════════════════════
function openPanel(song, concertId) {
  const hist   = SONG_HISTORY[song] || [];
  const total  = hist.length;
  const opener = hist.filter(h => h.order===1).length;
  const encore = hist.filter(h => h.sec==='encore').length;
  const alb    = getAlbum(song);

  document.getElementById('p-name').textContent = song;
  document.getElementById('p-album-badge').innerHTML =
    `<span class="panel-song-album" style="background:${alb.color}18;color:${alb.color};border:1px solid ${alb.color}35">${alb.name}</span>`;
  document.getElementById('p-sub').textContent = '';
  const lastDate  = hist.length ? fmtDate(hist[hist.length-1].date) : '—';
  const daysSince = hist.length ? daysBetween(hist[hist.length-1].date, new Date().toISOString().slice(0,10)) : '—';
  document.getElementById('p-stats').innerHTML = `
    <div class="pstat"><div class="pstat-val">${total}</div><div class="pstat-label">총 공연</div></div>
    <div class="pstat"><div class="pstat-val" style="font-size:16px;padding-top:4px">${lastDate}</div><div class="pstat-label">마지막 공연</div></div>
    <div class="pstat"><div class="pstat-val">${daysSince}</div><div class="pstat-label">일 경과</div></div>`;

  document.getElementById('p-timeline').innerHTML = [...hist].reverse().map(h => {
    const isCurrent = h.concertId === concertId;
    const allIdx    = hist.findIndex(x => x.concertId === h.concertId);
    const gapDays   = allIdx > 0 ? daysBetween(hist[allIdx-1].date, h.date) : null;
    const gapBadge  = gapDays !== null
      ? `<span class="tl-gap-badge">${gapDays}일 만</span>`
      : `<span class="tl-gap-badge" style="color:var(--accent);border-color:rgba(200,255,0,.3);background:var(--accent-dim)">첫 공연</span>`;
    return `
      <div class="tl-item ${isCurrent?'current':''}">
        <div class="tl-dot"></div>
        <div class="tl-date">${fmtDate(h.date)}</div>
        <div class="tl-venue-link" onclick="goToConcert('${h.concertId}')">${h.venue}</div>
        <div class="tl-order">${h.order}번째 · ${h.sec==='encore'?'앙코르':'본공연'}</div>
        ${gapBadge}
      </div>`;
  }).join('');

  document.getElementById('song-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('song-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// 공연명 클릭 → 셋리 이동
function goToConcert(concertId) {
  const loc = findConcertLocation(concertId);
  if (!loc) return;
  closePanel();
  page = 'setlist';
  currentYear = loc.year;
  currentIdx  = loc.idx;
  renderNav();
  renderSetlistPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════
function selectConcert(idx) {
  currentIdx = idx;
  // 사이드바만 리렌더
  document.querySelectorAll('.concert-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  renderConcertContent();
  if (window.innerWidth < 720) document.getElementById('concert-content')?.scrollIntoView({ behavior:'smooth' });
}

function switchYear(y) {
  page = 'setlist';
  currentYear = +y;
  const concerts = CONCERTS[currentYear] || [];
  currentIdx = Math.max(0, concerts.length - 1); // 마지막 공연
  renderNav();
  renderSetlistPage();
}

function switchPage(p) {
  page = p;
  renderNav();
  if (p === 'albums') renderAlbumPage();
  else renderSetlistPage();
}

function goHome() {
  page = 'setlist';
  renderNav();
  renderSetlistPage();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ═══════════════════════════════════════════════════════
// INIT — 구글시트에서 데이터 로드
// ═══════════════════════════════════════════════════════
async function init() {
  // 로딩 화면
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px">
      <div style="font-family:var(--display);font-size:13px;color:var(--accent);letter-spacing:3px;animation:pulse 1.2s infinite">LOADING</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px">데이터 불러오는 중...</div>
    </div>`;

  try {
    const [concertRows, setlistRows, albumRows, songRows] = await Promise.all([
      fetchCSV(SHEET_URLS.concerts),
      fetchCSV(SHEET_URLS.setlist),
      fetchCSV(SHEET_URLS.albums),
      fetchCSV(SHEET_URLS.songs),
    ]);

    processData(concertRows, setlistRows, albumRows, songRows);

    // 디버그 정보 화면 표시 (임시)
    const years = Object.keys(CONCERTS);
    const debugInfo = years.map(y => `${y}: ${CONCERTS[y].length}개 공연, 첫공연 셋리 ${CONCERTS[y][0]?.setlist?.length||0}곡`).join(' / ');
    document.title = `로드완료 - ${debugInfo}`;

    // 가장 최신 연도로 초기화
    const years = Object.keys(CONCERTS).map(Number).sort((a,b) => b-a);
    currentYear = years[0] || new Date().getFullYear();
    const initConcerts = CONCERTS[currentYear] || [];
    currentIdx = Math.max(0, initConcerts.length - 1);

    renderHeader();
    renderNav();
    renderSetlistPage();

  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;padding:20px">
        <div style="font-family:var(--display);font-size:14px;color:var(--red);letter-spacing:2px">로드 실패</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text3);text-align:center;line-height:1.8">
          ${e.message}<br>구글시트 웹에 게시 설정을 확인해주세요.
        </div>
        <button onclick="init()" style="margin-top:8px;font-family:var(--mono);font-size:11px;letter-spacing:2px;padding:8px 20px;background:var(--bg3);border:1px solid var(--line2);color:var(--text2);border-radius:2px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

// pulse 애니메이션
const style = document.createElement('style');
style.textContent = '@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}';
document.head.appendChild(style);

init();
</script>
