<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SOLUTIONS — Setlist Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F9FA;
  --bg2: #FFFFFF;
  --bg3: #EFEFEF;
  --line: rgba(25,28,29,0.1);
  --line2: rgba(25,28,29,0.18);
  --black: #191C1D;
  --red: #B7102A;
  --red-dim: rgba(183,16,42,0.08);
  --text: #191C1D;
  --text2: #5A5F61;
  --text3: #9EA3A5;
  --display: 'Epilogue', sans-serif;
  --mono: 'Space Grotesk', sans-serif;
  --body: 'Noto Sans KR', sans-serif;
  --accent: #B7102A;
  --accent-dim: rgba(183,16,42,0.08);
  --accent-dim2: rgba(183,16,42,0.04);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
button{-webkit-appearance:none;appearance:none;color:inherit;cursor:pointer}
html{scroll-behavior:smooth;background:#F8F9FA!important;color-scheme:light}
body{background:#F8F9FA!important;color:#191C1D!important;font-family:var(–body);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:90;background:rgba(248,249,250,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(–line);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:baseline;gap:12px;cursor:pointer}
.logo{font-family:var(–display);font-weight:900;font-size:15px;letter-spacing:.5px;color:var(–black);text-transform:uppercase}
.logo-sub{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:3px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:24px}
.h-stat{text-align:right}
.h-stat-val{font-family:var(–display);font-size:18px;color:var(–black);font-weight:900;line-height:1}
.h-stat-label{font-family:var(–mono);font-size:8px;color:var(–text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* NAV */
.nav-bar{display:flex;align-items:center;padding:0 32px;border-bottom:1px solid var(–line);background:var(–bg);overflow-x:auto;gap:0}
.nav-bar::-webkit-scrollbar{height:0}
.nav-tab{font-family:var(–mono);font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(–text3);padding:12px 18px;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px;white-space:nowrap;text-transform:uppercase;-webkit-appearance:none}
.nav-tab:hover{color:var(–black)}
.nav-tab.active{color:var(–red);border-bottom-color:var(–red);font-weight:900;font-size:13px}
.nav-tab.album-tab{margin-left:auto;color:var(–text2)}
.nav-tab.album-tab.active{color:var(–red);border-bottom-color:var(–red)}
.nav-divider{width:1px;height:16px;background:var(–line2);margin:0 8px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 105px)}

/* SIDEBAR */
.sidebar{border-right:1px solid var(–line);overflow-y:auto;position:sticky;top:105px;height:calc(100vh - 105px);padding:20px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(–line2)}
.sidebar-label{font-family:var(–mono);font-size:8px;letter-spacing:3px;color:var(–text3);text-transform:uppercase;padding:0 20px 12px}
.concert-btn{width:100%;background:none;border:none;text-align:left;padding:10px 20px;border-left:2px solid transparent;transition:all .15s;position:relative}
.concert-btn:hover{background:rgba(183,16,42,0.03)}
.concert-btn.active{border-left-color:var(–red);background:rgba(183,16,42,0.04);border-left-width:3px}
.cb-date{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:1px;margin-bottom:2px}
.cb-venue{font-family:var(–display);font-size:11px;font-weight:700;color:var(–black);letter-spacing:-.2px;text-transform:uppercase}
.concert-btn.active .cb-venue{color:var(–red);font-size:13px;font-weight:900}
.concert-btn.active .cb-date{color:var(–red);font-weight:700;opacity:1}
.cb-count{font-family:var(–mono);font-size:8px;color:var(–text3);margin-top:2px}
.month-divider{font-family:var(–mono);font-size:8px;letter-spacing:3px;color:var(–text3);text-transform:uppercase;padding:16px 20px 6px;border-top:1px solid var(–line);margin-top:6px}

/* CONTENT */
.content{padding:40px 44px;max-width:820px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* CONCERT HERO */
.concert-hero{margin-bottom:40px}
.hero-eyebrow{font-family:var(–mono);font-size:8px;letter-spacing:4px;color:var(–red);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hero-eyebrow::before{content:’’;width:16px;height:1px;background:var(–red);display:inline-block}
.hero-venue{font-family:var(–display);font-weight:900;font-size:52px;letter-spacing:-2px;color:var(–black);line-height:.95;margin-bottom:16px;text-transform:uppercase}
.hero-meta{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid var(–black)}
.hero-date{font-family:var(–mono);font-size:13px;color:var(–text2);letter-spacing:2px}
.hero-tracks{font-family:var(–mono);font-size:10px;color:var(–text3);letter-spacing:2px;text-transform:uppercase}

/* SETLIST */
.set-label{font-family:var(–mono);font-size:8px;letter-spacing:4px;color:var(–text3);text-transform:uppercase;margin:24px 0 8px;display:flex;align-items:center;gap:10px}
.set-label::after{content:’’;flex:1;height:1px;background:var(–line)}
.setlist{list-style:none;margin-bottom:32px}
.sl-item{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(–line);cursor:pointer;transition:all .15s;position:relative}
.sl-item:hover .sl-song{color:var(–red);padding-left:4px}
.sl-num{font-family:var(–mono);font-size:10px;color:var(–text3);text-align:right}
.sl-song{font-family:var(–display);font-size:14px;font-weight:700;letter-spacing:-.3px;transition:all .15s;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.sl-badge{font-family:var(–mono);font-size:7px;letter-spacing:1.5px;padding:3px 7px;border-radius:1px;text-transform:uppercase;flex-shrink:0}
.badge-first{background:var(–red-dim);color:var(–red);border:1px solid rgba(183,16,42,.25)}
.badge-rare{background:var(–red-dim);color:var(–red);border:1px solid rgba(183,16,42,.25)}
.sl-gap{font-family:var(–mono);font-size:9px;color:var(–text3);text-align:right;white-space:nowrap}
.sl-gap.gap-long{color:var(–red)}
.sl-gap.gap-first{color:var(–red);font-weight:600}

/* MEDLEY */
.medley-item{cursor:default}
.medley-label{font-family:var(–display);font-size:14px;font-weight:700;color:var(–text2);text-transform:uppercase}
.medley-chips{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.medley-chip{font-family:var(–mono);font-size:10px;padding:2px 8px;border-radius:1px;background:var(–bg3);border:1px solid var(–line2);color:var(–black);cursor:pointer;transition:all .15s;-webkit-appearance:none}
.medley-chip:hover{background:var(–red-dim);border-color:var(–red);color:var(–red)}
.medley-plus{font-family:var(–mono);font-size:9px;color:var(–text3)}

/* ALBUM PAGE */
.album-page{padding:40px 44px;animation:fadeIn .25s ease;width:100%}
.album-page-header{margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(–black)}
.album-page-title{font-family:var(–display);font-weight:900;font-size:32px;letter-spacing:-1px;color:var(–black);text-transform:uppercase;margin-bottom:16px}
.album-page-title span{color:var(–red)}
.year-filter{display:flex;gap:4px;flex-wrap:wrap}
.yf-btn{font-family:var(–mono);font-size:9px;letter-spacing:2px;padding:5px 12px;border-radius:1px;border:1px solid var(–line2);background:transparent;color:var(–text3);transition:all .15s;text-transform:uppercase;-webkit-appearance:none}
.yf-btn:hover{color:var(–black);border-color:var(–black)}
.yf-btn.active{background:var(–red);color:#ffffff;border-color:var(–red);font-weight:600}

/* ALBUM CARDS */
.albums-grid{display:flex;flex-direction:column;gap:1px;background:var(–line)}
.alb-card{background:var(–bg2)}
.alb-card-header{display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;position:relative;transition:background .15s}
.alb-card-header:hover{background:rgba(183,16,42,.03)}
.alb-cover{width:52px;height:52px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;background:var(–bg3)}
.alb-cover img{width:100%;height:100%;object-fit:cover}
.alb-meta{flex:1}
.alb-title{font-family:var(–display);font-weight:900;font-size:13px;letter-spacing:-.2px;text-transform:uppercase;margin-bottom:3px}
.alb-info{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:1px}
.alb-stats{text-align:right}
.alb-played-count{font-family:var(–display);font-weight:900;font-size:24px;letter-spacing:-1px;color:var(–red)}
.alb-played-label{font-family:var(–mono);font-size:8px;color:var(–text3);letter-spacing:2px;text-transform:uppercase}
.alb-chevron{font-family:var(–mono);font-size:10px;color:var(–text3);margin-left:8px;transition:transform .2s}
.alb-card.open .alb-chevron{transform:rotate(180deg)}
.alb-songs{display:none;border-top:1px solid var(–line);background:var(–bg)}
.alb-card.open .alb-songs{display:block}
.alb-song-item{display:grid;grid-template-columns:28px 1fr auto auto;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(–line);cursor:pointer;transition:background .15s;position:relative}
.alb-song-item:hover{background:rgba(183,16,42,.03)}
.alb-song-item:last-child{border-bottom:none}
.alb-song-item.zero{opacity:.35;cursor:default}
.alb-song-item.zero:hover{background:transparent}
.as-track{font-family:var(–mono);font-size:9px;color:var(–text3);text-align:right}
.as-name{font-family:var(–display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:-.2px;transition:color .15s}
.alb-song-item:not(.zero):hover .as-name{color:var(–red)}
.as-bar-wrap{width:72px}
.as-bar-bg{height:2px;background:var(–bg3);border-radius:1px;overflow:hidden}
.as-bar-fill{height:100%;border-radius:1px;transition:width .4s ease;background:var(–red)}
.as-count{font-family:var(–mono);font-size:10px;color:var(–text2);min-width:32px;text-align:right}
.as-count.zero-count{color:var(–text3)}

/* SONG PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(25,28,29,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.panel-overlay.open{opacity:1;pointer-events:all}
/* ── SONG PANEL ── */
.song-panel{position:fixed;right:0;top:0;bottom:0;width:400px;background:#F8F9FA;border-left:1px solid var(–line2);z-index:210;overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.song-panel::-webkit-scrollbar{width:2px}
.song-panel::-webkit-scrollbar-thumb{background:var(–line2)}
.song-panel.open{transform:translateX(0)}

/* 패널 헤더 */
.panel-top{padding:20px 24px 0;position:sticky;top:0;background:#F8F9FA;z-index:5}
.panel-close-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid var(–line)}
.panel-close-btn{display:flex;align-items:center;gap:4px;background:transparent;border:none;color:var(–text2);font-family:var(–mono);font-size:9px;letter-spacing:2px;padding:0;cursor:pointer;transition:color .15s;text-transform:uppercase;-webkit-appearance:none}
.panel-close-btn:hover{color:var(–red)}
.panel-close-x{font-size:14px;color:var(–text3)}

/* 곡 이름 섹션 */
.panel-identifier{padding:20px 24px 16px;border-bottom:1px solid var(–line)}
.panel-identifier-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.panel-identifier-left{}
.panel-identifier-label{font-family:var(–mono);font-size:8px;letter-spacing:3px;color:var(–text3);text-transform:uppercase;margin-bottom:6px}
.panel-song-name{font-family:var(–display);font-weight:900;font-size:36px;line-height:1;letter-spacing:-1.5px;color:var(–black);text-transform:uppercase;margin-bottom:0}
.panel-total-shows{text-align:right;padding-top:2px}
.panel-total-label{font-family:var(–mono);font-size:8px;letter-spacing:2px;color:var(–text3);text-transform:uppercase;margin-bottom:4px}
.panel-total-val{font-family:var(–display);font-weight:900;font-size:40px;line-height:1;letter-spacing:-2px;color:var(–red)}
.panel-song-album{font-family:var(–mono);font-size:8px;letter-spacing:2px;padding:3px 8px;border-radius:1px;display:inline-block;text-transform:uppercase;margin-top:8px}
.panel-song-sub{display:none}

/* 통계 */
.panel-stats{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(–line)}
.pstat{padding:16px 24px;border-right:1px solid var(–line)}
.pstat:last-child{border-right:none}
.pstat-label{font-family:var(–mono);font-size:8px;color:var(–text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.pstat-val{font-family:var(–display);font-weight:900;font-size:20px;color:var(–black);letter-spacing:-.5px;line-height:1}
.pstat-sub{font-family:var(–mono);font-size:9px;color:var(–text3);margin-top:3px}

/* 히스토리 */
.panel-history{padding:0}
.ph-label{font-family:var(–mono);font-size:8px;letter-spacing:4px;color:var(–black);text-transform:uppercase;padding:20px 24px 16px;border-bottom:1px solid var(–line);display:flex;align-items:center;justify-content:space-between}
.ph-label-right{font-family:var(–mono);font-size:8px;color:var(–text3);letter-spacing:2px}

/* 타임라인 */
.timeline{position:relative;padding-left:0}
.timeline::before{display:none}
.tl-item{position:relative;padding:16px 24px 16px 56px;border-bottom:1px solid var(–line);transition:background .15s}
.tl-item:hover{background:rgba(183,16,42,.03)}
.tl-dot{position:absolute;left:24px;top:20px;width:8px;height:8px;border-radius:0;background:var(–text3);z-index:2;transition:background .15s}
.tl-item.current .tl-dot{background:var(–red)}
.tl-date{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
.tl-venue-link{font-family:var(–display);font-size:13px;font-weight:700;color:var(–black);margin-bottom:4px;cursor:pointer;display:block;transition:color .15s;text-transform:uppercase;letter-spacing:-.3px}
.tl-venue-link:hover{color:var(–red)}
.tl-venue-link::after{display:none}
.tl-item.current .tl-venue-link{color:var(–red)}
.tl-order{font-family:var(–mono);font-size:9px;color:var(–text3);letter-spacing:1px}
.tl-set-badge{position:absolute;right:24px;top:50%;transform:translateY(-50%);font-family:var(–mono);font-size:8px;color:var(–text3);letter-spacing:1px;background:transparent;border:1px solid var(–line2);padding:3px 8px;text-transform:uppercase}
.tl-gap-badge{display:inline-block;font-family:var(–mono);font-size:8px;padding:1px 6px;margin-top:3px;background:transparent;color:var(–text3);border:none;letter-spacing:1px}
.tl-item.current .tl-gap-badge{color:var(–red)}

/* MOBILE */
@media(max-width:720px){
header{padding:0 16px}
.header-right{gap:16px}
.nav-bar{padding:0 16px}
.layout{grid-template-columns:1fr}
.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(–line);display:flex;overflow-x:auto;padding:8px 0}
.sidebar::-webkit-scrollbar{height:0}
.sidebar-label,.month-divider{display:none}
.concert-btn{border-left:none;border-bottom:2px solid transparent;white-space:nowrap;padding:8px 14px;min-width:fit-content}
.concert-btn.active{border-bottom-color:var(–red);background:none}
.content,.album-page{padding:24px 16px}
.hero-venue{font-size:32px}
.song-panel{width:100%}
.album-page-title{font-size:24px}
.as-bar-wrap{display:none}
}
</style>

</head>
<body>

<header>
  <div class="logo-wrap" onclick="goHome()">
    <div class="logo">The Solutions</div>
    <div class="logo-sub">Setlist Archive</div>
  </div>
  <div class="header-right">
    <div class="h-stat">
      <div class="h-stat-val" id="hd-concerts">—</div>
      <div class="h-stat-label">Concerts</div>
    </div>
    <div class="h-stat">
      <div class="h-stat-val" id="hd-songs">—</div>
      <div class="h-stat-label">Songs</div>
    </div>
  </div>
</header>

<div class="nav-bar" id="nav-bar"></div>
<div id="app"></div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<aside class="song-panel" id="song-panel">
  <div class="panel-top">
    <div class="panel-close-row">
      <button class="panel-close-btn" onclick="closePanel()">← Back</button>
      <span class="panel-close-x" onclick="closePanel()" style="cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text3)">CLOSE ×</span>
    </div>
  </div>
  <div class="panel-identifier">
    <div class="panel-identifier-row">
      <div class="panel-identifier-left">
        <div class="panel-identifier-label">Identifier</div>
        <div class="panel-song-name" id="p-name">—</div>
      </div>
      <div class="panel-total-shows" id="p-total-shows"></div>
    </div>
    <div id="p-album-badge"></div>
    <div class="panel-song-sub" id="p-sub"></div>
  </div>
  <div class="panel-stats" id="p-stats"></div>
  <div class="panel-history">
    <div class="ph-label">Performance History <span class="ph-label-right">Chronological</span></div>
    <div class="timeline" id="p-timeline"></div>
  </div>
</aside>

<script>
// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS URLs
// ═══════════════════════════════════════════════════════
// 구글시트 ID
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxLIokiKFCyAC4YX-XxdEiit-UcXQTmL9xuFsPUOdK24Q-Xvw58t6JsrHZaNg_SIaD/exec';

async function fetchAllData() {
  const res = await fetch(APPS_SCRIPT_URL);
  if (!res.ok) throw new Error('Apps Script 호출 실패');
  return await res.json();
}

// ═══════════════════════════════════════════════════════
// DATA (시트에서 로드 후 채워짐)
// ═══════════════════════════════════════════════════════
let CONCERTS = {};
let ALBUMS   = [];
let MEDLEYS  = { "종+멸": ["종", "멸"] };
let SONG_TO_ALBUM = {};
let SONG_HISTORY  = {};

function expandSong(s)  { return MEDLEYS[s] || [s]; }
function isMedley(s)    { return !!MEDLEYS[s]; }

// ── 시트 데이터 → 내부 구조 변환 ──────────────────────
function normalizeDate(dateStr) {
  if (!dateStr) return '';
  if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) return dateStr.slice(0,10);
  try {
    const d = new Date(dateStr);
    if (!isNaN(d)) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }
  } catch(e) {}
  return dateStr;
}

function processData(concertRows, setlistRows, albumRows, songRows) {

  // ALBUMS
  ALBUMS = albumRows.map(r => ({
    id:    r.album_id,
    name:  r.album_name,
    year:  +r.year || 0,
    color: r.color || '#888',
    cover: r.cover_url || '',
    tracks: [],
  }));
  ALBUMS.push({ id:'etc', name:'기타/미분류', year:0, color:'#555', tracks:[] });

  // SONGS → 앨범 tracks 채우기
  SONG_TO_ALBUM = {};
  songRows.forEach(r => {
    const alb = ALBUMS.find(a => a.id === r.album_id);
    if (alb) alb.tracks.push(r.song);
    SONG_TO_ALBUM[r.song] = r.album_id || 'etc';
    if (r.combined === 'TRUE' && r.sub_songs) {
      const subs = r.sub_songs.split('/').map(s => s.trim());
      MEDLEYS[r.song] = subs;
    }
  });

  // CONCERTS
  const concertMap = {};
  concertRows.forEach(r => {
    if (!r.concert_id || !r.date) return;
    const date = normalizeDate(r.date);
    const year = +date.slice(0,4);
    if (!year) return;
    if (!concertMap[year]) concertMap[year] = [];
    concertMap[year].push({
      id:      r.concert_id,
      date:    date,
      venue:   r.venue,
      setlist: [],
    });
  });

  // SETLIST → concerts에 붙이기
  setlistRows.forEach(r => {
    if (!r.concert_id || !r.song) return;
    const year = Object.keys(concertMap).find(y =>
      concertMap[y].some(c => c.id === r.concert_id)
    );
    if (!year) return;
    const concert = concertMap[year].find(c => c.id === r.concert_id);
    if (!concert) return;
    concert.setlist.push({
      o:   +r.order,
      s:   r.song,
      sec: r.section || 'main',
    });
  });

  // 각 공연 셋리 순서 정렬
  Object.values(concertMap).forEach(concerts => {
    concerts.forEach(c => c.setlist.sort((a,b) => a.o - b.o));
    concerts.sort((a,b) => a.date.localeCompare(b.date));
  });

  CONCERTS = concertMap;

  // SONG_HISTORY 빌드
  SONG_HISTORY = {};
  Object.values(CONCERTS).forEach(concerts => {
    concerts.forEach(c => {
      c.setlist.forEach(item => {
        expandSong(item.s).forEach(song => {
          if (!SONG_HISTORY[song]) SONG_HISTORY[song] = [];
          SONG_HISTORY[song].push({
            concertId: c.id, date: c.date, venue: c.venue,
            order: item.o, sec: item.sec, displayName: item.s,
          });
        });
      });
    });
  });
}

function getAlbum(song) {
  const id = SONG_TO_ALBUM[song] || 'etc';
  return ALBUMS.find(a => a.id === id) || ALBUMS[ALBUMS.length-1];
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let page        = 'setlist'; // 'setlist' | 'albums'
let currentYear = 2026;
let currentIdx  = 0;
let albumYear   = 'all';

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function parseDate(s){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)}
function daysBetween(a,b){return Math.round(Math.abs(parseDate(b)-parseDate(a))/864e5)}
function fmtDate(s){const[y,m,d]=s.split('-');return`${y}.${m}.${d}`}

function getGap(song, concertId) {
  const hist = SONG_HISTORY[song];
  if (!hist) return null;
  const idx = hist.findIndex(h => h.concertId === concertId);
  if (idx <= 0) return { type:'first', label:'첫 공연' };
  const days = daysBetween(hist[idx-1].date, hist[idx].date);
  return { type: days > 60 ? 'long' : 'normal', label:`${days}일 만` };
}

// 곡의 특정 연도 공연 횟수
function getSongCountByYear(song, year) {
  const hist = SONG_HISTORY[song] || [];
  if (year === 'all') return hist.length;
  return hist.filter(h => h.date.startsWith(String(year))).length;
}

function getTotalConcerts(){ return Object.values(CONCERTS).reduce((a,b)=>a+b.length,0) }
function getAllUniqueSongs(){ return Object.keys(SONG_HISTORY).length }

// concertId → {year, idx}
function findConcertLocation(concertId) {
  for (const [year, concerts] of Object.entries(CONCERTS)) {
    const idx = concerts.findIndex(c => c.id === concertId);
    if (idx !== -1) return { year: +year, idx };
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function renderNav() {
  const years = Object.keys(CONCERTS).sort((a,b) => b - a);
  let html = years.map(y =>
    `<button class="nav-tab ${page==='setlist'&&+y===currentYear?'active':''}" onclick="switchYear(${y})">${y}</button>`
  ).join('');
  html += `<div class="nav-divider"></div>`;
  html += `<button class="nav-tab album-tab ${page==='albums'?'active':''}" onclick="switchPage('albums')">💿 ALBUMS</button>`;
  document.getElementById('nav-bar').innerHTML = html;
}

function renderHeader() {
  document.getElementById('hd-concerts').textContent = getTotalConcerts();
  document.getElementById('hd-songs').textContent    = getAllUniqueSongs();
}

// ═══════════════════════════════════════════════════════
// SETLIST PAGE
// ═══════════════════════════════════════════════════════
function renderSetlistPage() {
  const concerts = CONCERTS[currentYear] || [];
  let sidebarHtml = `<div class="sidebar-label">${currentYear} Concerts</div>`;
  let lastMonth = '';
  concerts.forEach((c, i) => {
    const month = c.date.slice(0,7);
    if (month !== lastMonth) {
      if (lastMonth) sidebarHtml += `<div class="month-divider">${c.date.slice(5,7)}월</div>`;
      lastMonth = month;
    }
    sidebarHtml += `
      <button class="concert-btn ${i===currentIdx?'active':''}" onclick="selectConcert(${i})">
        <div class="cb-date">${fmtDate(c.date)}</div>
        <div class="cb-venue">${c.venue}</div>
        <div class="cb-count">${c.setlist.length} tracks</div>
      </button>`;
  });
  if (!concerts.length) sidebarHtml += `<div style="padding:32px 24px;font-family:var(--mono);font-size:11px;color:var(--text3)">데이터 없음</div>`;

  document.getElementById('app').innerHTML = `
    <div class="layout">
      <aside class="sidebar">${sidebarHtml}</aside>
      <main class="content" id="concert-content"></main>
    </div>`;

  renderConcertContent();
}

function renderConcertContent() {
  const concerts = CONCERTS[currentYear] || [];
  const el = document.getElementById('concert-content');
  if (!el) return;
  if (!concerts.length) {
    el.innerHTML = `<div style="padding:80px 0;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text3)">해당 연도 데이터가 없습니다</div>`;
    return;
  }
  const c = concerts[currentIdx];
  const [y, m, d] = c.date.split('-');
  const main   = c.setlist.filter(x => x.sec==='main');
  const encore = c.setlist.filter(x => x.sec==='encore');

  function renderItems(items) {
    return items.map(item => {
      const isM = isMedley(item.s);
      const subSongs = expandSong(item.s);
      // gap은 첫 번째 서브곡 기준
      const gap = getGap(subSongs[0], c.id);
      let badgeHtml='', gapHtml='';
      if (gap) {
        if (gap.type==='first') { badgeHtml=`<span class="sl-badge badge-first">첫 공연</span>`; gapHtml=`<span class="sl-gap gap-first">✦ debut</span>`; }
        else if (gap.type==='long') { badgeHtml=`<span class="sl-badge badge-rare">★</span>`; gapHtml=`<span class="sl-gap gap-long">${gap.label}</span>`; }
        else { gapHtml=`<span class="sl-gap">${gap.label}</span>`; }
      }

      if (isM) {
        // 메들리: 표기는 종+멸, 클릭하면 서브곡 선택 팝업 대신 첫 곡 패널 열기
        // 서브곡 각각 클릭 가능한 칩으로 표시
        const chips = subSongs.map(sub =>
          `<span class="medley-chip" onclick="event.stopPropagation();openPanel('${sub}','${c.id}')">${sub}</span>`
        ).join('<span class="medley-plus">+</span>');
        return `<li class="sl-item medley-item">
          <span class="sl-num">${String(item.o).padStart(2,'0')}</span>
          <span class="sl-song">
            <span class="medley-label">${item.s}</span>
            <span class="medley-chips">${chips}</span>
            ${badgeHtml}
          </span>
          ${gapHtml}
        </li>`;
      }

      return `<li class="sl-item" onclick="openPanel('${item.s}','${c.id}')">
        <span class="sl-num">${String(item.o).padStart(2,'0')}</span>
        <span class="sl-song">${item.s}${badgeHtml}</span>
        ${gapHtml}
      </li>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="concert-hero">
      <div class="hero-top">
        <div class="hero-eyebrow">Date: ${y}.${m}.${d}</div>
        <div class="hero-venue">${c.venue}</div>
        <div class="hero-meta">
          <span class="hero-date">${y}.${m}.${d}</span>
          <span class="hero-tracks">${c.setlist.length} TRACKS</span>
        </div>
      </div>
    </div>
    ${main.length?`<div class="set-label">Main Set — ${main.length}</div><ul class="setlist">${renderItems(main)}</ul>`:''}
    ${encore.length?`<div class="set-label">Encore — ${encore.length}</div><ul class="setlist">${renderItems(encore)}</ul>`:''}
  `;
}

// ═══════════════════════════════════════════════════════
// ALBUM PAGE
// ═══════════════════════════════════════════════════════
function renderAlbumPage() {
  const years = ['all', ...Object.keys(CONCERTS).filter(y => CONCERTS[y].length)];
  const yfilter = years.map(y =>
    `<button class="yf-btn ${albumYear==y?'active':''}" onclick="setAlbumYear('${y}')">${y==='all'?'전체':y}</button>`
  ).join('');

  // 앨범별 총 플레이 횟수
  const albumsWithCount = ALBUMS.filter(a => a.id !== 'etc').map(alb => {
    const totalPlayed = alb.tracks.reduce((sum, t) => sum + getSongCountByYear(t, albumYear), 0);
    return { ...alb, totalPlayed };
  });

  const maxCount = Math.max(...albumsWithCount.flatMap(a => a.tracks.map(t => getSongCountByYear(t, albumYear))), 1);

  const albumCards = albumsWithCount.map(alb => {
    const songRows = alb.tracks.map((t, i) => {
      const count = getSongCountByYear(t, albumYear);
      const barW  = Math.round((count / maxCount) * 100);
      const isZero = count === 0;
      return `
        <div class="alb-song-item ${isZero?'zero':''}" ${!isZero?`onclick="openPanel('${t}',null)"`:''}">
          <span class="as-track">${String(i+1).padStart(2,'0')}</span>
          <span class="as-name">${t}</span>
          <div class="as-bar-wrap">
            <div class="as-bar-bg">
              <div class="as-bar-fill" style="width:${barW}%;background:${alb.color}"></div>
            </div>
          </div>
          <span class="as-count ${isZero?'zero-count':''}">${isZero?'—':count+'회'}</span>
        </div>`;
    }).join('');

    return `
      <div class="alb-card" id="alb-${alb.id}">
        <div class="alb-card-header" style="--alb-color:${alb.color}" onclick="toggleAlbum('${alb.id}')">
          <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:${alb.color};border-radius:0"></div>
          <div class="alb-cover" style="background:${alb.color}15;border:1px solid ${alb.color}30">
            ${alb.cover ? `<img src="${alb.cover}" alt="${alb.name}" onerror="this.parentElement.innerHTML='💿'">` : '<span>💿</span>'}
          </div>
          <div class="alb-meta">
            <div class="alb-title" style="color:${alb.color}">${alb.name}</div>
            <div class="alb-info">${alb.year} · ${alb.tracks.length}곡</div>
          </div>
          <div class="alb-stats">
            <div class="alb-played-count" style="color:${alb.color}">${alb.totalPlayed}</div>
            <div class="alb-played-label">총 공연</div>
          </div>
          <span class="alb-chevron">▼</span>
        </div>
        <div class="alb-songs">${songRows}</div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="album-page">
      <div class="album-page-header">
        <div class="album-page-title">Album <span>Stats</span></div>
        <div class="year-filter">${yfilter}</div>
      </div>
      <div class="albums-grid">${albumCards}</div>
    </div>`;
}

function toggleAlbum(id) {
  document.getElementById(`alb-${id}`).classList.toggle('open');
}

function setAlbumYear(y) {
  albumYear = y;
  renderAlbumPage();
}

// ═══════════════════════════════════════════════════════
// SONG PANEL
// ═══════════════════════════════════════════════════════
function openPanel(song, concertId) {
  const hist   = SONG_HISTORY[song] || [];
  const total  = hist.length;
  const opener = hist.filter(h => h.order===1).length;
  const encore = hist.filter(h => h.sec==='encore').length;
  const alb    = getAlbum(song);

  document.getElementById('p-name').textContent = song;
  document.getElementById('p-album-badge').innerHTML =
    `<span class="panel-song-album" style="background:${alb.color}18;color:${alb.color};border:1px solid ${alb.color}35">${alb.name}</span>`;
  document.getElementById('p-sub').textContent = '';
  const lastDate  = hist.length ? fmtDate(hist[hist.length-1].date) : '—';
  const daysSince = hist.length ? daysBetween(hist[hist.length-1].date, new Date().toISOString().slice(0,10)) : '—';
  document.getElementById('p-total-shows').innerHTML = `
    <div class="panel-total-label">Total Shows</div>
    <div class="panel-total-val">${total}</div>`;
  document.getElementById('p-stats').innerHTML = `
    <div class="pstat"><div class="pstat-label">Last Performance</div><div class="pstat-val">${lastDate}</div></div>
    <div class="pstat" style="border-right:none"><div class="pstat-label">Days Elapsed</div><div class="pstat-val">${daysSince}<span class="pstat-sub"> Since Last</span></div></div>`;

  document.getElementById('p-timeline').innerHTML = [...hist].reverse().map(h => {
    const isCurrent = h.concertId === concertId;
    const allIdx    = hist.findIndex(x => x.concertId === h.concertId);
    const gapDays   = allIdx > 0 ? daysBetween(hist[allIdx-1].date, h.date) : null;
    const gapBadge  = gapDays !== null
      ? `<span class="tl-gap-badge">${gapDays}일 만</span>`
      : `<span class="tl-gap-badge" style="color:var(--accent);border-color:rgba(200,255,0,.3);background:var(--accent-dim)">첫 공연</span>`;
    return `
      <div class="tl-item ${isCurrent?'current':''}">
        <div class="tl-dot"></div>
        <div class="tl-date">${fmtDate(h.date)}</div>
        <div class="tl-venue-link" onclick="goToConcert('${h.concertId}')">${h.venue}</div>
        <div class="tl-order">${h.order}번째 · ${h.sec==='encore'?'앙코르':'본공연'}</div>
        <div class="tl-gap-badge">${gapDays !== null ? gapDays+'일 만' : '첫 공연'}</div>
        <span class="tl-set-badge">SET #${allIdx+1}</span>
      </div>`;
  }).join('');

  document.getElementById('song-panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('song-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// 공연명 클릭 → 셋리 이동
function goToConcert(concertId) {
  const loc = findConcertLocation(concertId);
  if (!loc) return;
  closePanel();
  page = 'setlist';
  currentYear = loc.year;
  currentIdx  = loc.idx;
  renderNav();
  renderSetlistPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════
function selectConcert(idx) {
  currentIdx = idx;
  // 사이드바만 리렌더
  document.querySelectorAll('.concert-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  renderConcertContent();
  if (window.innerWidth < 720) document.getElementById('concert-content')?.scrollIntoView({ behavior:'smooth' });
}

function switchYear(y) {
  page = 'setlist';
  currentYear = +y;
  const concerts = CONCERTS[currentYear] || [];
  currentIdx = Math.max(0, concerts.length - 1); // 마지막 공연
  renderNav();
  renderSetlistPage();
}

function switchPage(p) {
  page = p;
  renderNav();
  if (p === 'albums') renderAlbumPage();
  else renderSetlistPage();
}

function goHome() {
  page = 'setlist';
  renderNav();
  renderSetlistPage();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ═══════════════════════════════════════════════════════
// INIT — 구글시트에서 데이터 로드
// ═══════════════════════════════════════════════════════
async function init() {
  // 로딩 화면
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px">
      <div style="font-family:var(--display);font-size:13px;color:var(--accent);letter-spacing:3px;animation:pulse 1.2s infinite">LOADING</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px">데이터 불러오는 중...</div>
    </div>`;

  try {
    const data = await fetchAllData();
    const concertRows = data.concerts || [];
    const setlistRows = data.setlist  || [];
    const albumRows   = data.albums   || [];
    const songRows    = data.songs    || [];

    processData(concertRows, setlistRows, albumRows, songRows);

    // 가장 최신 연도로 초기화
    const years = Object.keys(CONCERTS).map(Number).sort((a,b) => b-a);
    currentYear = years[0] || new Date().getFullYear();
    const initConcerts = CONCERTS[currentYear] || [];
    currentIdx = Math.max(0, initConcerts.length - 1);

    renderHeader();
    renderNav();
    renderSetlistPage();

  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;padding:20px">
        <div style="font-family:var(--display);font-size:14px;color:var(--red);letter-spacing:2px">로드 실패</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text3);text-align:center;line-height:1.8">
          ${e.message}<br>구글시트 웹에 게시 설정을 확인해주세요.
        </div>
        <button onclick="init()" style="margin-top:8px;font-family:var(--mono);font-size:11px;letter-spacing:2px;padding:8px 20px;background:var(--bg3);border:1px solid var(--line2);color:var(--text2);border-radius:2px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

// pulse 애니메이션
const style = document.createElement('style');
style.textContent = '@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}';
document.head.appendChild(style);

init();
</script>
